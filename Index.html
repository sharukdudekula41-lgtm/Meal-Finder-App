<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Meal Finder</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  </head>
<body>
  <header class="nav navbar navbar-expand-lg">
    <div class="container-fluid d-flex align-items-center justify-content-between">
      <a class="navbar-brand text-white d-flex align-items-center" href="#">
        <button id="homeBtn" class="btn btn-sm btn-link text-white p-0 me-2" title="Home" aria-label="Home">
          <ion-icon name="home-outline" style="font-size:20px;"></ion-icon>
        </button>
        <span>MEAL FINDER</span>
      </a>
      <button id="menuBtn" class="menu-btn btn btn-link text-white fs-2" aria-label="Open menu">☰</button>
    </div>
  </header>

  <!-- Side drawer -->
  <aside id="drawer" class="drawer">
    <button id="closeBtn" class="close-btn">✕</button>
    <ul id="catList"></ul>
  </aside>

  <!-- Hero -->
  <section class="hero">
    <div class="search-box w-100">
        <div class="input-group" style="max-width:520px;">
        <input id="searchInput" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" type="text" class="form-control" placeholder="Search recipes here ..." />
        <button id="searchBtn" class="search-btn" type="button" aria-label="Search"><ion-icon name="search-outline"></ion-icon></button>
      </div>
    </div>
    <h1>What are your favorite cuisines?</h1>
    <p>PERSONALIZE YOUR EXPERIENCE</p>
  </section>

  <main class="container">
    <!-- Breadcrumb (meal detail page only) -->
    <div id="crumb" class="crumb hidden"></div>

    <!-- Category description -->
    <section id="catInfo" class="cat-info hidden"></section>

    <!-- Meal detail -->
    <section id="mealDetail" class="meal-detail hidden"></section>

    <!-- Meals grid (search/category) -->
    <section id="mealsSection" class="hidden">
      <h2 class="section-title">MEALS</h2>
      <div id="mealsGrid" class="grid meals-grid"></div>
    </section>

    <!-- Categories grid -->
    <section id="categoriesSection">
      <h2 class="section-title">CATEGORIES</h2>
      <div id="catGrid" class="grid cats-grid"></div>
    </section>
  </main>

  <footer class="footer"></footer>

  <!-- Ionicons -->
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script src="Script.js"></script>
</body>
</html>
